server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para backend — resolve cookie cross-origin
    location /auth/ {
        proxy_pass http://backend:3001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    location /tokens/ {
        proxy_pass http://backend:3001/tokens/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # /api-docs sem trailing slash também bate aqui (prefix match sem /)
    location /api-docs {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Reescreve o header Location que o Express manda com host:3001
        # para evitar redirect para porta errada
        proxy_redirect http://backend:3001/ /;
    }

    # SPA — redireciona todas as rotas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
